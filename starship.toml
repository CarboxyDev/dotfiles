add_newline = true
command_timeout = 10000

format = "$username$hostname$localip$shlvl$singularity$kubernetes$nats$directory$vcsh$fossil_branch$fossil_metrics$git_branch$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$pijul_channel$docker_context$package$bun$c$cmake$cobol$cpp$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$xmake$zig$buf$guix_shell$nix_shell$conda$pixi$meson$spack$memory_usage$aws$gcloud$openstack$azure$direnv$env_var$mise$crystal$custom$sudo$line_break$jobs$battery$status$container$netns$os$shell$character"

right_format = "$cmd_duration$time"

[gcloud]
disabled = true

[directory]
truncation_length = 1
truncate_to_repo = true
fish_style_pwd_dir_length = 0

[nodejs]
detect_files = ["package.json", ".nvmrc"]

[python]
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version"]
pyenv_version_name = false

[conda]
ignore_base = true

[package]
disabled = true

[cmd_duration]
min_time = 2000
format = "took [$duration](yellow) "

[time]
disabled = false
format = "[$time](dimmed white) "
time_format = "%I:%M %p"

[hostname]
ssh_only = true

[username]
show_always = false
